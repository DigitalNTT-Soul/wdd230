<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>FILLME TITLE</title>
        <meta name="description" content="A signup and page rating form for users.">
        <meta name="author" content="Dylan Ruppell">
        <link rel="stylesheet" href="styles/normalize.css">
        <link rel="stylesheet" href="styles/base.css">
        <link rel="stylesheet" href="styles/larger.css">
        <link rel="stylesheet" href="styles/form.css">
        <link rel="icon" href="favicon.ico" type="image/x-icon">
    </head>
    <body>
        <header>
            <img id="pic-of-self" src="images/cruise-pic-reduced.webp" alt="Photograph of Dylan Ruppell" width="375" height="465">
            <h1 id="my-name">Dylan Ruppell</h1>
        </header>
        <nav>
            <button id="burger" aria-label="mobile view hamburger menu"></button>
            <ul class="navi">
                <li><a href="index.html">Home</a></li>
                <li><a href="lesson03/chamber-site-plan.html">Site Plan</a></li>
                <li><a href="chamber/">Chamber</a></li>
                <li><a href="https://www.byui.edu">BYU Idaho</a></li>
                <li><a href="https://www.churchofjesuschrist.org/study/scriptures/nt/matt/25?lang=eng&id=p40#p40">Scripture</a></li>
            </ul>
        </nav>
        <main>
            <form method="get" action="record.html">
                <label>Username* <input class="textInput" type="text" id="uname" name="uname" required></label>
                <label>Password* <input class="textInput" type="password" id="password" name="password" pattern="[A-Za-z0-9]{8,}" required></label>
                <label>Password Confirmation* <input class="textInput" type="password" id="password-confirm" name="password-confirm" required></label>
                <label>Email* <input class="textInput" type="email" id="email" name="email" pattern="[a-zA-Z0-9._%+-]+@byui\.edu$" title="Please enter a valid email address" required></label>
                <label>Page Rating: <span id="rangevalue">5</span>
                    <input type="range" id="page-rating" name="page-rating" min="1" max="10" value="5" step="1" list="rangevalues">
                    <datalist id="rangevalues">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                    </datalist>
                </label>
                <input type="submit" value="Sign Me Up!" id="submitBtn">
            </form>
        </main>
        <footer>
            <p id="copyright-string">Dylan Ruppell - Tennessee, United States of America</p>
            <p id="last-modified-date"></p>
        </footer>
        <script src="scripts/last-modified-tag-update.js"></script>
        <script src="scripts/burger.js"></script>
        <script src="scripts/copyright-tag-update.js"></script>
        <script src="scripts/form.js"></script>
    </body>
</html>
